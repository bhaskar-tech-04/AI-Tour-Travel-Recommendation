<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Chatbot - Your Personal Travel Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px 15px 0 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: #e9ecef;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .user .avatar {
            order: 2;
        }

        .bot .avatar {
            background: #667eea;
            color: white;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .clear-btn {
            padding: 8px 16px;
            background: #6c757d;
            font-size: 12px;
            border-radius: 20px;
        }

        .clear-btn:hover {
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.3);
        }

        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .welcome-message h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #667eea;
        }

        .welcome-message p {
            margin-bottom: 15px;
            font-size: 14px;
        }

        .quick-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 20px;
        }

        .suggestion-btn {
            padding: 8px 16px;
            background: #e9ecef;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .suggestion-btn:hover {
            background: #667eea;
            color: white;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            40% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        /* Scrollbar styling */
        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        @media (max-width: 600px) {
            .message-content {
                max-width: 90%;
            }

            .header h1 {
                font-size: 24px;
            }

            .container {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }

            .header {
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✈️ Travel Chatbot</h1>
            <p>Your Personal Travel Assistant - Plan your next adventure!</p>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="welcome-message">
                <h2>👋 Welcome to Travel Assistant!</h2>
                <p>I'm here to help you plan your perfect trip.</p>
                <p>Ask me anything about destinations, budgets, activities, or itineraries!</p>
                <div class="quick-suggestions">
                    <button class="suggestion-btn" onclick="sendMessage('Recommend a beach destination')">🏖️ Beach Destination</button>
                    <button class="suggestion-btn" onclick="sendMessage('Suggest an adventure trip')">🏔️ Adventure Trip</button>
                    <button class="suggestion-btn" onclick="sendMessage('What destinations are available?')">🌍 All Destinations</button>
                    <button class="suggestion-btn" onclick="sendMessage('Tell me about budget options')">💰 Budget Options</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="Ask me about travel destinations, budgets, activities..." />
                <button onclick="sendMessage()" id="sendBtn">Send</button>
                <button class="clear-btn" onclick="clearChat()">Clear</button>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // Focus input on load
        messageInput.focus();

        // Send message on Enter key
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function sendMessage(message = null) {
            const userMessage = message || messageInput.value.trim();
            
            if (!userMessage) return;

            // Display user message
            displayMessage(userMessage, 'user');
            messageInput.value = '';
            
            // Show loading indicator
            showLoadingIndicator();

            // Send to backend
            fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: userMessage })
            })
            .then(response => response.json())
            .then(data => {
                removeLoadingIndicator();
                if (data.status === 'success') {
                    displayMessage(data.response, 'bot');
                } else {
                    displayMessage('Sorry, something went wrong. Please try again.', 'bot');
                }
            })
            .catch(error => {
                removeLoadingIndicator();
                console.error('Error:', error);
                displayMessage('Sorry, I encountered an error. Please try again.', 'bot');
            });

            messageInput.focus();
        }

        function displayMessage(message, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = sender === 'user' ? '👤' : '🤖';

            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = message;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(content);
            chatContainer.appendChild(messageDiv);

            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showLoadingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.id = 'loadingIndicator';

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = '🤖';

            const content = document.createElement('div');
            content.className = 'message-content loading';
            content.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(content);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeLoadingIndicator() {
            const loading = document.getElementById('loadingIndicator');
            if (loading) loading.remove();
        }

        function clearChat() {
            if (confirm('Are you sure you want to clear the chat history?')) {
                fetch('/api/clear-chat', {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    chatContainer.innerHTML = `
                        <div class="welcome-message">
                            <h2>👋 Welcome to Travel Assistant!</h2>
                            <p>I'm here to help you plan your perfect trip.</p>
                            <p>Ask me anything about destinations, budgets, activities, or itineraries!</p>
                            <div class="quick-suggestions">
                                <button class="suggestion-btn" onclick="sendMessage('Recommend a beach destination')">🏖️ Beach Destination</button>
                                <button class="suggestion-btn" onclick="sendMessage('Suggest an adventure trip')">🏔️ Adventure Trip</button>
                                <button class="suggestion-btn" onclick="sendMessage('What destinations are available?')">🌍 All Destinations</button>
                                <button class="suggestion-btn" onclick="sendMessage('Tell me about budget options')">💰 Budget Options</button>
                            </div>
                        </div>
                    `;
                    messageInput.focus();
                });
            }
        }
    </script>
</body>
</html>
